<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUBBLE DANCE</title>

  <!-- Fuentes: Orbitron (display) + Share Tech Mono (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset & Variables ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff4fa3;
      --cyan:   #00f5d4;
      --yellow: #ffe45e;
      --purple: #a78bfa;
      --bg:     #070918;
      --bg2:    #0c0e24;
      --text:   #dde2f5;
      --mono:   'Share Tech Mono', monospace;
      --display:'Orbitron', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── PANTALLA DE CARGA ──────────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      background: var(--bg);
      z-index: 200;
    }

    #loading h1 {
      font-family: var(--display);
      font-size: clamp(26px, 6vw, 54px);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--cyan);
      text-shadow: 0 0 28px var(--cyan), 0 0 60px var(--cyan);
    }

    .loader-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .loader-track {
      width: 260px; height: 3px;
      background: #ffffff18;
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      box-shadow: 0 0 12px var(--cyan);
      animation: shimmer 2.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { width: 0%;  margin-left: 0%; }
      50%  { width: 55%; margin-left: 20%; }
      100% { width: 0%;  margin-left: 100%; }
    }

    #loading-msg {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #ffffff55;
    }

    #error-msg {
      display: none;
      color: var(--pink);
      font-size: 14px;
      text-align: center;
      max-width: 320px;
      line-height: 1.7;
    }

    /* ─── MENÚ ───────────────────────────────────────────────────────────────── */
    #menu {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 36px;
      background: var(--bg);
      z-index: 100;
    }
    #menu.hidden { display: none; }

    /* Fondo de puntos decorativo */
    #menu::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, #00f5d41a 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, #ff4fa31a 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, #a78bfa11 0%, transparent 60%);
      pointer-events: none;
    }

    .title-wrap { text-align: center; }

    .menu-title {
      font-family: var(--display);
      font-size: clamp(34px, 8vw, 68px);
      font-weight: 900;
      letter-spacing: 0.14em;
      background: linear-gradient(130deg, var(--cyan) 0%, var(--pink) 50%, var(--yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px var(--cyan));
      line-height: 1;
    }

    .menu-tagline {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #ffffff44;
    }

    /* Cards de coreografía */
    .choreo-grid {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .choreo-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid #ffffff14;
      border-radius: 18px;
      padding: 26px 30px 22px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      text-align: center;
      min-width: 150px;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .choreo-card::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--card-glow, var(--cyan));
      opacity: 0;
      transition: opacity 0.18s;
      border-radius: 18px;
    }
    .choreo-card:hover::after  { opacity: 0.08; }
    .choreo-card:hover {
      transform: translateY(-4px);
      border-color: var(--card-glow);
      box-shadow: 0 0 28px var(--card-glow);
    }
    .choreo-card:active { transform: translateY(-1px) scale(0.98); }

    .choreo-card:nth-child(1) { --card-glow: var(--cyan);   }
    .choreo-card:nth-child(2) { --card-glow: var(--pink);   }
    .choreo-card:nth-child(3) { --card-glow: var(--yellow); }

    .card-emoji { font-size: 38px; display: block; margin-bottom: 10px; }

    .card-name {
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .card-meta {
      margin-top: 8px;
      font-size: 12px;
      color: #ffffff40;
      letter-spacing: 0.06em;
      line-height: 1.7;
    }

    /* How-to */
    .howto {
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: #ffffff44;
      letter-spacing: 0.08em;
    }
    .howto-item { text-align: center; }
    .howto-item .icon { font-size: 22px; display: block; margin-bottom: 5px; }

    /* ─── ARENA (juego activo) ───────────────────────────────────────────────── */
    #arena {
      position: fixed; inset: 0;
      display: none;
    }
    #arena.active { display: block; }

    /* Vídeo: llena la pantalla, se espeja con CSS */
    #feed {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);       /* espejo horizontal */
    }

    /* Canvas: superpuesto al vídeo, mismo tamaño */
    #canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* Botón salir */
    #btn-back {
      position: absolute;
      top: 16px; left: 16px;
      background: #ffffff12;
      border: 1px solid #ffffff20;
      color: #ffffffcc;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.09em;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 20;
      transition: background 0.15s, border-color 0.15s;
    }
    #btn-back:hover { background: #ffffff22; border-color: #ffffff44; }

    /* Overlay de resultados — botones sobre el canvas */
    #results-overlay {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 56px;
      gap: 14px;
      z-index: 10;
      pointer-events: none;  /* deja pasar clics al canvas salvo botones */
    }
    #results-overlay.visible { display: flex; }

    .btn-result {
      pointer-events: auto;
      font-family: var(--display);
      font-size: 13px;
      letter-spacing: 0.12em;
      padding: 14px 40px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #btn-replay {
      background: var(--cyan);
      color: #07091a;
      box-shadow: 0 0 22px var(--cyan);
    }
    #btn-replay:hover { box-shadow: 0 0 38px var(--cyan); transform: scale(1.04); }

    #btn-go-menu {
      background: transparent;
      color: #ffffffaa;
      border: 1px solid #ffffff30;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.1em;
      padding: 10px 30px;
    }
    #btn-go-menu:hover { border-color: #ffffff66; color: #fff; }
  </style>
</head>
<body>

  <!-- ── PANTALLA DE CARGA ─────────────────────────────────────────────────── -->
  <div id="loading">
    <h1>BUBBLE DANCE</h1>
    <div class="loader-wrap">
      <div class="loader-track"><div class="loader-fill"></div></div>
      <span id="loading-msg">CARGANDO MODELO DE DETECCIÓN...</span>
    </div>
    <p id="error-msg"></p>
  </div>

  <!-- ── MENÚ ─────────────────────────────────────────────────────────────── -->
  <div id="menu" class="hidden">

    <div class="title-wrap">
      <div class="menu-title">BUBBLE DANCE</div>
      <p class="menu-tagline">MUEVE TUS MANOS · EXPLOTA LAS BURBUJAS · CREA LA COREOGRAFÍA</p>
    </div>

    <div class="choreo-grid" id="choreo-grid">
      <!-- Cards generadas por JS -->
    </div>

    <div class="howto">
      <div class="howto-item"><span class="icon">📷</span>Permite la cámara</div>
      <div class="howto-item"><span class="icon">✋</span>Mueve las manos</div>
      <div class="howto-item"><span class="icon">💥</span>Explota la burbuja</div>
      <div class="howto-item"><span class="icon">🎯</span>Sigue la secuencia</div>
    </div>

  </div>

  <!-- ── ARENA ─────────────────────────────────────────────────────────────── -->
  <div id="arena">
    <video id="feed" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="btn-back">← SALIR</button>

    <div id="results-overlay">
      <button id="btn-replay"   class="btn-result">JUGAR DE NUEVO</button>
      <button id="btn-go-menu"  class="btn-result">MENÚ</button>
    </div>
  </div>

  <!-- ── Módulos del juego (se cargan primero, no necesitan red) ──────────── -->
  <script src="tracker.js"></script>
  <script src="game.js"></script>

  <!-- ── Controlador de la app ─────────────────────────────────────────────── -->
  <script>
    'use strict';

    // ── Referencias DOM ──────────────────────────────────────────────────────
    const $loading        = document.getElementById('loading');
    const $loadingMsg     = document.getElementById('loading-msg');
    const $errorMsg       = document.getElementById('error-msg');
    const $menu           = document.getElementById('menu');
    const $choreoGrid     = document.getElementById('choreo-grid');
    const $arena          = document.getElementById('arena');
    const $feed           = document.getElementById('feed');
    const $canvas         = document.getElementById('canvas');
    const $btnBack        = document.getElementById('btn-back');
    const $resultsOverlay = document.getElementById('results-overlay');
    const $btnReplay      = document.getElementById('btn-replay');
    const $btnGoMenu      = document.getElementById('btn-go-menu');

    // ── Estado global ────────────────────────────────────────────────────────
    let tracker       = null;
    let game          = null;
    let lastChoreoIdx = 0;

    // ── Carga dinámica de scripts con promesa ─────────────────────────────────
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        // Si ya existe en el DOM (recarga), resolverlo directamente
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s    = document.createElement('script');
        s.src      = src;
        s.onload   = resolve;
        s.onerror  = () => reject(new Error(`No se pudo cargar: ${src}`));
        document.head.appendChild(s);
      });
    }

    // ── Timeout con mensaje de ayuda ─────────────────────────────────────────
    let timeoutHandle = null;
    function startStuckTimer() {
      clearTimeout(timeoutHandle);
      timeoutHandle = setTimeout(() => {
        $loadingMsg.style.display = 'none';
        $errorMsg.style.display   = 'block';
        $errorMsg.innerHTML =
          `⏳ <strong>Tardando demasiado...</strong><br><br>` +
          `El modelo de IA descarga ~4MB de la red.<br>` +
          `Verifica tu conexión a internet y recarga.<br><br>` +
          `<span style="color:#ffffff44;font-size:12px">` +
          `(Necesita acceso a: cdn.jsdelivr.net y storage.googleapis.com)</span>`;
      }, 18000); // 18 segundos de espera máxima
    }

    // ── Inicialización ───────────────────────────────────────────────────────
    async function init() {
      // Construir cards de coreografías
      CHOREOGRAPHIES.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'choreo-card';
        card.innerHTML = `
          <span class="card-emoji">${c.emoji}</span>
          <div class="card-name">${c.name.toUpperCase()}</div>
          <div class="card-meta">${c.bpm} BPM<br>${c.steps.length} PASOS</div>
        `;
        card.addEventListener('click', () => launchGame(i));
        $choreoGrid.appendChild(card);
      });

      try {
        // ── Paso 1: Cargar TensorFlow.js desde CDN ──
        $loadingMsg.textContent = '1/3  DESCARGANDO TENSORFLOW.JS (~3MB)...';
        startStuckTimer();
        await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js');

        // ── Paso 2: Cargar librería de detección de poses ──
        $loadingMsg.textContent = '2/3  DESCARGANDO POSE-DETECTION...';
        await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');
        clearTimeout(timeoutHandle);

        // ── Paso 3: Cámara + modelo MoveNet ──
        $loadingMsg.textContent = '3/3  INICIANDO CÁMARA Y MODELO...';
        startStuckTimer();
        tracker = new PoseTracker();
        await tracker.init($feed, $canvas);
        clearTimeout(timeoutHandle);

      } catch (err) {
        clearTimeout(timeoutHandle);
        $loadingMsg.style.display = 'none';
        $errorMsg.style.display   = 'block';

        if (err.name === 'NotAllowedError') {
          $errorMsg.innerHTML = `❌ <strong>Cámara denegada.</strong><br>Permite el acceso en el navegador y recarga.`;
        } else if (err.name === 'NotFoundError') {
          $errorMsg.innerHTML = `❌ <strong>No se encontró cámara</strong> en este dispositivo.`;
        } else if (err.message.includes('No se pudo cargar')) {
          $errorMsg.innerHTML =
            `❌ <strong>Sin acceso a la red.</strong><br><br>` +
            `Este juego necesita descargar el modelo de IA (~4MB).<br>` +
            `Conéctate a internet y recarga la página.<br><br>` +
            `<span style="color:#ffffff44;font-size:11px">Error: ${err.message}</span>`;
        } else {
          $errorMsg.innerHTML = `❌ Error: ${err.message}`;
        }
        return;
      }

      // ── Juego listo ──
      game = new BubbleGame($canvas, tracker);
      $canvas.addEventListener('gameover', onGameOver);

      $loading.style.display = 'none';
      $menu.classList.remove('hidden');
    }

    // ── Navegación ───────────────────────────────────────────────────────────

    function launchGame(choreoIdx) {
      lastChoreoIdx = choreoIdx;
      $menu.classList.add('hidden');
      $arena.classList.add('active');
      $resultsOverlay.classList.remove('visible');
      game.startGame(choreoIdx);
    }

    function goToMenu() {
      if (game) game.stop();
      $arena.classList.remove('active');
      $resultsOverlay.classList.remove('visible');
      $menu.classList.remove('hidden');
    }

    function onGameOver(evt) {
      $resultsOverlay.classList.add('visible');
      console.log('GAME OVER', evt.detail);
    }

    // ── Eventos de botones ───────────────────────────────────────────────────
    $btnBack.addEventListener('click', goToMenu);
    $btnGoMenu.addEventListener('click', goToMenu);
    $btnReplay.addEventListener('click', () => launchGame(lastChoreoIdx));

    // ── Arrancar ─────────────────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
